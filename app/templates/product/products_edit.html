{% extends "base.html" %}
{% block title %} Product Update {% endblock %}

{% block content %}
<h1> Edit Product </h1>

<!-- for product in products --> 

<p> Form to update Product in DB </p>
<p></p>
<form action="{{url_for('products.edit_product', product_id=product.product_id)}}" method="post">
    <label for="name"> Product Name: </label>
    <input type="text" id="name" name="name" value="{{product.product_name}}">
    <br>
    <label for="description"> Product Description: </label>
    <input type="text" id="description" name="description" value="{{product.description}}" style="width: 500px;">
    <br>
    <label for="price">Product Price:</label>
    <input type="text" id="price" name="price" value="{{product.price}}">
    <br>
    <label for="quantity">Product Quantity:</label>
    <input type="text" id="quantity" name="quantity" value="{{product.quantity}}">
    <br>
    <label for="category"> Categories</label>
    <select name="categories" multiple>
        {% for category in categories %}
        <option value= "{category.category_id}"> 
            {{category.category_name}} 
        </option>
        {% endfor %}
    </select>
    <button type="submit" class="greenButton"> Save </button>
</form>

{% endblock %}
