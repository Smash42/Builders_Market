{% extends "base.html" %}

{% block title %} Admin Dashboard {% endblock %}

{% block content %}

<h2>Welcome Back, Administrator: {{ g.user.username }}!</h2>

<div class="dashboard-grid">

    <button class="greenButton">
        <a href="{{ url_for('orders.view_orders') }}" > My Orders </a>
    </button>

    <button class="purpleButton">
        <a href="{{ url_for('reviews.view_all_reviews') }}" > Reviews </a>
    </button>

    <button>
        <a href="{{ url_for('products.get_products') }}" class="greenButton"> Products </a>
    </button>

    <button class="purpleButton">
        <a href="{{ url_for('category.view_categories') }}" > Categories </a>
    </button>

    <button class="greenButton">
        <a href="{{ url_for('auth.profile') }}" > My Profile </a>
    </button>

</div>

{% endblock %}
