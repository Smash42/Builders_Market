{% extends "base.html" %}

{% block title %} Admin Dashboard {% endblock %}

{% block content %}

<h1>Welcome Back, Administrator: {{ g.user.username }}!</h1>

<div class="dashboard-grid">
    <button class="greenButton">
        <a href="{{ url_for('products.get_products') }}" > Products </a>
    </button>

    <button class="blueButton">
        <a href="{{ url_for('orders.view_orders') }}" > All Orders </a>
    </button>

    <button class="purpleButton">
        <a href="{{ url_for('reviews.view_all_reviews') }}" > All Reviews </a>
    </button>


    <button class="orangeButton">
        <a href="{{ url_for('admin.view_users') }}" > Users </a>
    </button>

        <button class="yellowButton">
        <a href="{{ url_for('category.view_categories') }}" > Categories </a>
    </button>

    <button class="redButton">
        <a href="{{ url_for('admin.view_roles') }}" > Roles </a>
    </button>

    <button class="pinkButton">
        <a href="{{ url_for('admin.view_permissions') }}" > Permissions </a>
    </button>



    <button class="greenButton">
        <a href="{{ url_for('auth.profile') }}" > My Profile </a>
    </button>

</div>

{% endblock %}
