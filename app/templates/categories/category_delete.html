{% extends "base.html" %}
{% block title %} Category- Delete {% endblock %}

{% block content %}
<h1> Delete Product</h1>

<br>
    <p> Are you sure you want to delete <strong> {{category.category_name}} </strong> ? </p>
    <br>

<form method="POST" action="{{ url_for('category.delete_category', category_id=category.category_id) }}">
    <button type="submit" class="redButton">Delete</button>
</form>

{% endblock %}
