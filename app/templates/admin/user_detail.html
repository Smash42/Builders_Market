{% extends "base.html" %}
{% block title %} User Detail- Admin {% endblock %}

{% block content %}
<h1> User Details: Admin View </h1>

<h2> Username: {{user.username}} </h2>    <h3>Email: {{user.email}} <br> User ID: {{user.user_id}}  <br> Role: {{user.role}} </h3>


<form method="POST" action="{{ url_for('admin.update_user_role', user_id=user.user_id) }}">
<select name="role_id">
    {% for role in roles %}
        <option value="{{ role.role_id }}"
            {% if role.role_id == user.role_id %}selected{% endif %}>
            {{ role.role_name }}
        </option>
    {% endfor %}
</select>
<button type="submit"  class="greenButton"> Save </button>
</form>
<br>
    <button class="orangeButton">
        <a href="{{ url_for ('admin.edit_user', user_id = user.user_id)}}"> 
            Edit User Information </a>
    </button>
    
    <button class="redButton">
        <a  href="{{ url_for ('admin.delete_user', user_id = user.user_id)}}">  Delete User </a>
    </button>

<br>


{% endblock %}
