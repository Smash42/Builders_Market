{% extends "base.html" %}
{% block title %} Reviews- Delete {% endblock %}

{% block content %}

<h1> Delete Review </h1>

<div class="delete-grid">
    <h4 class="delete-q"> Are you sure you want to delete this review for {{product.product_name}}? </h4>
    <div class="delete-card">
        <p> User: {{user.username}}</p>
        <p> Rating: {{review.rating}}</p>
        <p> Product: {{product.product_name}}</p>



        <form method="POST" action="{{ url_for('reviews.delete_review', review_id=review.review_id, product_id = review.product_id) }}">
        <button type="submit" class="redButton">Delete Review</button>
        </form>
    </div>
<br><br>
        <button class="orangeButton" type="submit">
            <a href="{{url_for('reviews.view_all_reviews', review_id=review.review_id)}}"> Cancel </a>
        </button>
</div>

{% endblock %}
