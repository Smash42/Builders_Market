
{% extends "base.html" %}
{% block title %} Password Reset {% endblock %}

{% block content %}

<h1> Password Reset </h1>
<div class="auth-grid">
<div class="auth-card">
    <p> Fill out the sections below to register </p>
    <form action="{{url_for('auth.password_reset')}}" method="post">
        <label for="email"> Email: </label>
        <input type="text" id="email" name="email" required>
        <br><br>
        <button type="submit" class="greenButton" > Send Password Reset </button>
    </form>

    </div>
</div>
{% endblock %}
