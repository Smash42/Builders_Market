
{% extends "base.html" %}
{% block title %} Register User {% endblock %}

{% block content %}

<h1> Register User </h1>
<div class="auth-grid">
<div class="auth-card">
    <p> Fill out the sections below to register </p> <br>
    <form action="{{url_for('auth.register')}}" method="post">
        <label for="name"> Username: </label>
        <input type="text" id="name" name="name" required>
        <br><br>
        <label for="email"> Email: </label>
        <input type="text" id="email" name="email" required>
        <br><br>
        <label for="password"> Password: </label>
        <input type="password" id="password" name="password" style="width: 100px;" required>
        <br><br>
        <label for="verifypassword"> Verify Password: </label>
        <input type="password" id="verifypassword" name="verifypassword" style="width: 100px;" required>
        <br> <br>
        <div class="auth-card-button">
        <button type="submit" class="orangeButton" > Register User </button>
        </div>
    </form>
    <p> Password must have at least: <br>
         1 Uppercase,  1 lowercase, <br>  1 number,
         a special character, <br> and 10 characters long. </p>
    </div>
</div>
{% endblock %}
